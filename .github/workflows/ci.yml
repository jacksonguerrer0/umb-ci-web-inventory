name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Instalar dependencias (respeta uv.lock)
        run: uv sync --locked
      - name: Verificar que la app arranca (smoke import)
        run: uv run python -c "from src.app import create_app; create_app()"

  lint:
    name: Lint (Pylint)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Pylint (falla si el puntaje baja de 9.5)
        run: uv run pylint src config --fail-under=9.5

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Tests unitarios
        run: uv run pytest tests/unit -v
      - name: Tests de integración
        run: uv run pytest tests/integration -v

  coverage:
    name: Coverage gate (>= 80%)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Tests con cobertura (umbral 80% statements+branches)
        run: >
          uv run pytest
          --cov
          --cov-report=term-missing
          --cov-report=html
          --cov-report=xml
          --cov-fail-under=80
      - name: Publicar reporte HTML de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: htmlcov/
      - name: Publicar coverage.xml (para SonarCloud)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: coverage
    environment: PROD
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Aviso si falta el token
        if: env.SONAR_TOKEN == ''
        run: echo "::warning::SONAR_TOKEN no configurado; se omitió el análisis de SonarCloud"

  build:
    name: Build artifact
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - uses: actions/checkout@v4
      - name: Empaquetar la aplicación
        run: |
          mkdir -p dist
          zip -r dist/inventory-api.zip src config pyproject.toml uv.lock requirements.txt -x "*__pycache__*"
      - name: Publicar artefacto de despliegue
        uses: actions/upload-artifact@v4
        with:
          name: inventory-api
          path: dist/inventory-api.zip
